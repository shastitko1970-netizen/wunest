<!doctype html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens/colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:#1a130a; color:#f4e4c1; font-family: var(--nest-font-body); }
  .wrap { padding: 22px 26px; }
  .eyebrow { font-family: var(--nest-font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:#8a6a3a; margin-bottom: 8px; }
  h1 { font-family: 'Fraunces', serif; font-weight:400; font-size: 26px; letter-spacing:-0.02em; margin: 0 0 4px; color:#f4e4c1; }
  .sub { font-size: 13px; color:#8a6a3a; margin-bottom: 14px; }
  .swatches { display:flex; gap: 8px; margin-bottom: 14px; }
  .sw { width: 54px; height: 54px; border-radius: 10px; border: 1px solid #6b4a2a; }
  .msg { display:flex; gap:10px; padding: 12px 14px; background:#2a1f12; border:1px solid #6b4a2a; border-radius: 12px; max-width: 440px; }
  .avatar { width:32px;height:32px;border-radius:50%;background:#d4904a;opacity:0.25;flex-shrink:0; }
  .name { font-weight:600; font-size:13px; color:#f4e4c1; }
  .time { font-family: var(--nest-font-mono); font-size:10px; color:#8a6a3a; margin-left:6px; }
  .body { font-size: 14px; line-height:1.5; color:#f4e4c1; margin-top:3px; }
  .body em { font-style: italic; color:#d4904a; }
</style></head>
<body><div class="wrap">
  <div class="eyebrow">THEME · TAVERN WARM</div>
  <h1>Пергамент и бронза</h1>
  <div class="swatches">
    <div class="sw" style="background:#1a130a"></div>
    <div class="sw" style="background:#2a1f12"></div>
    <div class="sw" style="background:#6b4a2a"></div>
    <div class="sw" style="background:#d4904a"></div>
  </div>
  <div class="msg">
    <div class="avatar"></div>
    <div style="flex:1">
      <div><span class="name">Alyra</span><span class="time">14:32</span></div>
      <div class="body">She closed the ledger softly. <em>«Вы уверены, что хотите это знать?»</em></div>
    </div>
  </div>
</div></body></html>
