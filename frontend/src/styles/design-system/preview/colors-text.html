<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
<div class="col" style="gap:12px">
  <div class="row" style="gap:16px;align-items:center">
    <div style="width:48px;height:48px;border-radius:8px;background:var(--nest-text)"></div>
    <div><div class="nest-body" style="color:var(--nest-text)">Primary text — read this first</div><div class="nest-caption">--nest-text · #f0f0f0</div></div>
  </div>
  <div class="row" style="gap:16px;align-items:center">
    <div style="width:48px;height:48px;border-radius:8px;background:var(--nest-text-secondary)"></div>
    <div><div class="nest-body" style="color:var(--nest-text-secondary)">Secondary text — supporting copy</div><div class="nest-caption">--nest-text-secondary · #999</div></div>
  </div>
  <div class="row" style="gap:16px;align-items:center">
    <div style="width:48px;height:48px;border-radius:8px;background:var(--nest-text-muted)"></div>
    <div><div class="nest-body" style="color:var(--nest-text-muted)">Muted — timestamps, helper</div><div class="nest-caption">--nest-text-muted · #666</div></div>
  </div>
</div>
</div></body></html>
