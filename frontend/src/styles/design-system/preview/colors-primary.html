<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
<div class="row" style="gap:14px">
  <div class="col" style="align-items:center;gap:6px">
    <div style="width:88px;height:88px;border-radius:12px;background:var(--nest-bg);border:1px solid var(--nest-border)"></div>
    <div class="nest-caption">--nest-bg</div>
    <div class="nest-caption" style="color:var(--nest-text-muted)">#080808</div>
  </div>
  <div class="col" style="align-items:center;gap:6px">
    <div style="width:88px;height:88px;border-radius:12px;background:var(--nest-surface);border:1px solid var(--nest-border)"></div>
    <div class="nest-caption">--nest-surface</div>
    <div class="nest-caption" style="color:var(--nest-text-muted)">#141414</div>
  </div>
  <div class="col" style="align-items:center;gap:6px">
    <div style="width:88px;height:88px;border-radius:12px;background:var(--nest-bg-elevated);border:1px solid var(--nest-border)"></div>
    <div class="nest-caption">--nest-bg-elevated</div>
    <div class="nest-caption" style="color:var(--nest-text-muted)">#0f0f0f</div>
  </div>
  <div class="col" style="align-items:center;gap:6px">
    <div style="width:88px;height:88px;border-radius:12px;background:var(--nest-border)"></div>
    <div class="nest-caption">--nest-border</div>
    <div class="nest-caption" style="color:var(--nest-text-muted)">#222</div>
  </div>
  <div class="col" style="align-items:center;gap:6px">
    <div style="width:88px;height:88px;border-radius:12px;background:var(--nest-accent)"></div>
    <div class="nest-caption" style="color:var(--nest-accent)">--nest-accent</div>
    <div class="nest-caption" style="color:var(--nest-text-muted)">#ef4444</div>
  </div>
</div>
</div></body></html>
