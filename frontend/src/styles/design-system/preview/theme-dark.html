<!doctype html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens/colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:#080808; color:#f0f0f0; font-family: var(--nest-font-body); }
  .wrap { padding: 22px 26px; }
  .eyebrow { font-family: var(--nest-font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:#666; margin-bottom: 8px; }
  h1 { font-family: var(--nest-font-display); font-weight:400; font-size: 26px; letter-spacing:-0.02em; margin: 0 0 4px; color:#f0f0f0; }
  .sub { font-size: 13px; color:#666; margin-bottom: 14px; }
  .swatches { display:flex; gap: 8px; margin-bottom: 14px; }
  .sw { width: 54px; height: 54px; border-radius: 10px; border: 1px solid #222; }
  .msg { display:flex; gap:10px; padding: 12px 14px; background:#141414; border:1px solid #222; border-radius: 12px; max-width: 440px; }
  .avatar { width:32px;height:32px;border-radius:50%;background:#ef4444;opacity:0.25;flex-shrink:0; }
  .name { font-weight:600; font-size:13px; color:#f0f0f0; }
  .time { font-family: var(--nest-font-mono); font-size:10px; color:#666; margin-left:6px; }
  .body { font-size: 14px; line-height:1.5; color:#f0f0f0; margin-top:3px; }
  .body em { font-style: italic; color:#ef4444; }
</style></head>
<body><div class="wrap">
  <div class="eyebrow">THEME · NEST DEFAULT DARK</div>
  <h1>Нейтральная тёмная</h1>
  <div class="swatches">
    <div class="sw" style="background:#080808"></div>
    <div class="sw" style="background:#141414"></div>
    <div class="sw" style="background:#222"></div>
    <div class="sw" style="background:#ef4444"></div>
  </div>
  <div class="msg">
    <div class="avatar"></div>
    <div style="flex:1">
      <div><span class="name">Alyra</span><span class="time">14:32</span></div>
      <div class="body">She closed the ledger softly. <em>«Вы уверены, что хотите это знать?»</em></div>
    </div>
  </div>
</div></body></html>
