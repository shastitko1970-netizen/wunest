<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.card-plain { background: var(--nest-surface); border:1px solid var(--nest-border-subtle); border-radius: var(--nest-radius); padding: 16px; max-width:240px; box-shadow: var(--nest-shadow-sm); }
.card-plain h4 { margin:0 0 6px; font-family: var(--nest-font-body); font-weight:600; font-size:14px; color: var(--nest-text); }
.card-plain p { margin:0; font-size:13px; line-height:1.5; color: var(--nest-text-secondary); }
.card-plain .meta { display:flex; gap:8px; margin-top:10px; font-family: var(--nest-font-mono); font-size:10px; color: var(--nest-text-muted); letter-spacing:0.05em; text-transform:uppercase; }
.card-hover { transition: border-color var(--nest-transition-fast), transform var(--nest-transition-fast); cursor:pointer; }
.card-hover:hover { border-color: var(--nest-text-muted); transform: translateY(-1px); }
</style>
</head>
<body><div class="card">
<div class="row" style="gap:14px">
  <div class="card-plain">
    <h4>Alyra</h4>
    <p>Keeper of the ledger. Sees every line.</p>
    <div class="meta"><span>FANTASY</span><span>·</span><span>12 CHATS</span></div>
  </div>
  <div class="card-plain card-hover">
    <h4>The Tavern</h4>
    <p>A crossroads where stories tangle.</p>
    <div class="meta"><span>WORLD</span><span>·</span><span>4K TOK</span></div>
  </div>
</div>
</div></body></html>
