<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.nest-msg { display:flex; gap:12px; padding:14px 16px; background: var(--nest-surface); border:1px solid var(--nest-border-subtle); border-radius: var(--nest-radius); max-width:560px; }
.nest-msg-avatar { width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#4a3a2a,#2a1a0a); flex-shrink:0; display:flex;align-items:center;justify-content:center; color:#e0a96d; font-family: var(--nest-font-display); font-size:18px; }
.nest-msg-head { display:flex; align-items:baseline; gap:8px; margin-bottom:4px; }
.nest-msg-name { font-weight:600; color: var(--nest-text); font-size:14px; }
.nest-msg-time { font-family: var(--nest-font-mono); font-size:11px; color: var(--nest-text-muted); }
.nest-msg-body { font-size:15px; line-height:1.55; color: var(--nest-text); }
.nest-msg-body em { color: var(--nest-accent); font-style: italic; }
</style>
</head>
<body><div class="card">
<div class="nest-msg is-assistant">
  <div class="nest-msg-avatar">A</div>
  <div style="flex:1">
    <div class="nest-msg-head">
      <span class="nest-msg-name">Alyra</span>
      <span class="nest-msg-time">14:32</span>
    </div>
    <div class="nest-msg-body">She closed the ledger softly. <em>«Вы уверены, что хотите это знать?»</em> The candle flickered once, as if in answer.</div>
  </div>
</div>
</div></body></html>
