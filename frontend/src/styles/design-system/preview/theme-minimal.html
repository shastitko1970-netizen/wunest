<!doctype html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens/colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:#fafafa; color:#1a1a1a; font-family: var(--nest-font-body); }
  .wrap { padding: 22px 26px; }
  .eyebrow { font-family: var(--nest-font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:#888; margin-bottom: 8px; }
  h1 { font-family: 'Fraunces', serif; font-weight:400; font-size: 26px; letter-spacing:-0.02em; margin: 0 0 4px; color:#1a1a1a; }
  .sub { font-size: 13px; color:#888; margin-bottom: 14px; }
  .swatches { display:flex; gap: 8px; margin-bottom: 14px; }
  .sw { width: 54px; height: 54px; border-radius: 10px; border: 1px solid #eaeaea; }
  .msg { display:flex; gap:10px; padding: 12px 14px; background:#ffffff; border:1px solid #eaeaea; border-radius: 12px; max-width: 440px;  }
  .avatar { width:32px;height:32px;border-radius:50%;background:#555;opacity:0.35;flex-shrink:0; }
  .name { font-weight:600; font-size:13px; color:#1a1a1a; }
  .time { font-family: var(--nest-font-mono); font-size:10px; color:#888; margin-left:6px; }
  .body { font-size: 14px; line-height:1.5; color:#1a1a1a; margin-top:3px; }
  .body em { font-style: italic; color:#555; }
</style></head>
<body><div class="wrap">
  <div class="eyebrow">THEME · MINIMAL READER</div>
  <h1>Editorial режим чтения</h1>
  <div class="swatches">
    <div class="sw" style="background:#fafafa"></div>
    <div class="sw" style="background:#ffffff"></div>
    <div class="sw" style="background:#eaeaea"></div>
    <div class="sw" style="background:#555"></div>
  </div>
  <div class="msg">
    <div class="avatar"></div>
    <div style="flex:1">
      <div><span class="name">Alyra</span><span class="time">14:32</span></div>
      <div class="body">She closed the ledger softly. <em>«Вы уверены, что хотите это знать?»</em></div>
    </div>
  </div>
</div></body></html>
