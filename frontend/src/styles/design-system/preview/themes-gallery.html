<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.swatch { flex:1; min-height:120px; border-radius: var(--nest-radius-sm); padding:10px 12px; display:flex; flex-direction:column; justify-content:space-between; border:1px solid; }
.s-dark { background:#080808; color:#f0f0f0; border-color:#222; }
.s-light { background:#FAFAF7; color:#141412; border-color:#E2DFD6; }
.s-warm { background:#2a1f12; color:#f4e4c1; border-color:#6b4a2a; font-family: 'Fraunces', serif; }
.s-cyber { background:#150a20; color:#f1d1ff; border-color:#3c1e50; }
.swatch .name { font-family: var(--nest-font-mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; opacity:0.7; }
.swatch .sample { font-size:13px; line-height:1.4; }
</style>
</head>
<body><div class="card">
<div class="row" style="gap:10px;align-items:stretch">
  <div class="swatch s-dark">
    <div class="name">nest dark</div>
    <div class="sample">She closed the ledger <span style="color:#ef4444;font-style:italic">softly</span>.</div>
  </div>
  <div class="swatch s-light">
    <div class="name">dossier light</div>
    <div class="sample">She closed the ledger <span style="color:#ef4444;font-style:italic">softly</span>.</div>
  </div>
  <div class="swatch s-warm">
    <div class="name">tavern warm</div>
    <div class="sample">She closed the ledger <span style="color:#d4904a;font-style:italic">softly</span>.</div>
  </div>
  <div class="swatch s-cyber">
    <div class="name">cyber neon</div>
    <div class="sample">She closed the ledger <span style="color:#c485ff;font-style:italic">softly</span>.</div>
  </div>
</div>
</div></body></html>
