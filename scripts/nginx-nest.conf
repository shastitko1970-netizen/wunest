# nginx server block for nest.wusphere.ru
#
# Reverse-proxies to the currently active WuNest container via the
# wunest_backend upstream (defined in /etc/nginx/conf.d/wunest-upstream.conf
# and flipped by scripts/deploy.sh).
#
# TLS is expected to be provisioned via certbot (or the existing wusphere.ru
# wildcard).

server {
    listen 80;
    listen [::]:80;
    server_name nest.wusphere.ru;

    # Redirect all HTTP to HTTPS.
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nest.wusphere.ru;

    # Managed by certbot:
    ssl_certificate     /etc/letsencrypt/live/nest.wusphere.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nest.wusphere.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types application/json text/css application/javascript text/plain application/xml;
    gzip_min_length 1024;

    # The app (Go binary serves both the embedded SPA and /api/*).
    location / {
        proxy_pass http://wunest_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # SSE streaming (chat completions): disable all buffering.
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
